<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password - Sakhi Enterprises</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e9f7ee; /* Light green background */
    }

    .forgot-box {
      background-color: #ffffff; /* White card box */
      padding: 30px;
      width: 330px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.15);
      border-top: 4px solid #1b8f3a; /* Green header line */
    }

    h2 {
      color: #0b6b32; /* Dark green */
      margin-bottom: 15px;
    }

    p {
      font-size: 14px;
      color: #1b3a2b;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 5px;
      border: 1px solid #1b8f3a; /* Green border */
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: #1b8f3a; /* Green button */
      color: white;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background-color: #0b6b32; /* Dark green hover */
    }

    .back-link {
      margin-top: 15px;
      font-size: 14px;
    }

    .back-link a {
      text-decoration: none;
      color: #0b6b32;
      font-weight: bold;
    }

    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="forgot-box">

    <h2>Reset Password</h2>
    <p>Enter your email and create a new password.</p>

  <form action="/forgot-password" method="POST">

  <input type="email" name="email" placeholder="Enter your email address" required>

  <input type="password" name="new_password" placeholder="Enter new password" required>

  <input type="password" name="confirm_password" placeholder="Confirm new password" required>

  <button type="submit">Reset Password</button>
</form>


    <div class="back-link">
      <a href="login.html">← Back to Login</a>
    </div>

  </div>

  <script>
    function showMessage() {
      alert("Password reset successfully!");
    }
  </script>

</body>
</html>
