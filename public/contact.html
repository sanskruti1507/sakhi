<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Sakhi Enterprises</title>

    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

    <style>
        :root {
            --primary-green:#135720;;
            --light-green: #EAF7ED;
            --dark-green:#135720;;
            --text-dark: #333333;
            --white: #FFFFFF;
        }

        body {
            background-color: var(--light-green);
            color: var(--text-dark);
        }

        header {
            background-color: var(--primary-green);
        }

        .card {
            background: var(--white);
            border-left: 5px solid var(--primary-green);
            box-shadow: 0px 4px 12px rgba(0,0,0,0.12);
        }

        .stats-section {
            background: var(--dark-green);
            color: var(--white);
        }
        /* logo */
.logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.logo-img{width:100px;height:100px;object-fit:cover;border-radius:50%;background:transparent;padding:0;box-shadow:0 0 15px rgba(255,255,255,.5)}
.logo-text strong{font-size:1.3rem;color:#135720}
.logo-text small{font-size:.8rem;color:#555;display:block}

        footer {
            background-color: var(--primary-green);
            color: var(--white);
        }
    </style>
</head>

<body class="font-sans">

<!-- HEADER -->
<header class="shadow-md py-4 sticky top-0 z-50">
    <div class="container mx-auto flex justify-between items-center px-5">
        <a href="index.html"
           class="bg-white text-green-800 py-2 px-5 rounded-full hover:bg-green-100 transition font-semibold shadow-md">
            ← Back to Home
        </a>

        <h1 class="text-3xl font-bold text-white">Sakhi Enterprises</h1>

        <div class="w-16"></div>
    </div>
</header>

<!-- CONTACT SECTION -->
<section class="py-16">
    <div class="container mx-auto px-4">

        <h1 class="text-4xl font-bold text-center text-green-900 mb-10">
            Contact Us
        </h1>

        <div class="max-w-4xl mx-auto card rounded-lg p-8">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

                <!-- CONTACT INFORMATION -->
                <div>
                    <h2 class="text-2xl font-semibold mb-4 text-green-900">Contact Information</h2>

                    <p class="mb-2">
                        <strong>Sales Number:</strong><br>
                        <span class="text-xl font-bold text-green-700">+91 83299 32094</span>
                    </p>

                    <a href="https://wa.me/918329932094"
                       class="inline-block bg-green-900 text-white px-4 py-2 rounded-lg font-semibold mt-3 hover:bg-green-900 transition">
                        💬 Chat on WhatsApp
                    </a>

                    <p class="mt-6"><strong>Email:</strong> info@sakhienterprises.com</p>
                </div>
                 <a href="#" class="logo">
      <img src="/assets/images/logo.png" alt="Sakhi Enterprises Logo" class="logo-img">
      <div class="logo-text">
        <strong>Sakhi Enterprises</strong><br>
        <small>Packing Solutions</small>
      </div>
    </a>


            </div>

            <!-- CONTACT FORM -->
            <div class="mt-10">
                <h2 class="text-2xl font-semibold text-center mb-6 text-green-900">Send Us a Message</h2>

                <form id="contactForm" class="bg-white p-6 rounded-lg shadow-md border border-green-200"
                      action="/contact" method="POST">

                    <div class="mb-4">
                        <label class="block font-semibold mb-1">Your Name</label>
                        <input type="text" name="name" required
                               class="w-full border rounded px-3 py-2 focus:outline-green-700">
                    </div>

                    <div class="mb-4">
                        <label class="block font-semibold mb-1">Your Email</label>
                        <input type="email" name="email" required
                               class="w-full border rounded px-3 py-2 focus:outline-green-700">
                    </div>

                    <div class="mb-4">
                        <label class="block font-semibold mb-1">Phone Number (Optional)</label>
                        <input type="tel" name="phone"
                               class="w-full border rounded px-3 py-2 focus:outline-green-700">
                    </div>

                    <div class="mb-4">
                        <label class="block font-semibold mb-1">Your Message</label>
                        <textarea name="message" rows="5" required
                                  class="w-full border rounded px-3 py-2 focus:outline-green-700"></textarea>
                    </div>

                    <button type="submit"
                            class="w-full bg-green-900 text-white font-bold py-2 rounded-lg hover:bg-green-800 transition">
                        Send Message
                    </button>

                    <p id="statusMessage"
                       class="hidden mt-4 text-center font-semibold p-3 rounded"></p>
                </form>
            </div>

        </div>
    </div>
</section>

<!-- FOOTER -->
<footer class="py-8 text-center">
    <p>© 2026 Sakhi Enterprises — Packaging Solutions You Can Trust.</p>
    
</footer>

<script>
    const form = document.getElementById("contactForm");
    const statusMsg = document.getElementById("statusMessage");

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const data = {
            name: form.name.value,
            email: form.email.value,
            phone: form.phone.value,
            message: form.message.value,
        };

        try {
            const res = await fetch("/contact", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });

            const result = await res.json();

            if (result.success) {
                statusMsg.textContent = "Message sent successfully!";
                statusMsg.className = "mt-4 bg-green-200 text-green-900 p-3 rounded";
                statusMsg.classList.remove("hidden");
                form.reset();
            } else {
                throw new Error(result.message);
            }
        } catch {
            statusMsg.textContent = "Something went wrong. Try again.";
            statusMsg.className = "mt-4 bg-red-200 text-red-800 p-3 rounded";
            statusMsg.classList.remove("hidden");
        }
    });
</script>

</body>
</html>
