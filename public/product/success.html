<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order Successful – Sakhi Enterprises</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --primary:#1b5e20;
  --primary-light:#2e7d32;
  --bg:#e8f5e9;
  --card:#ffffff;
  --border:#c8e6c9;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  font-family: 'Segoe UI', Arial, sans-serif;
}

body{
  background: linear-gradient(135deg,#e8f5e9,#f1f8e9);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card{
  background:var(--card);
  width:100%;
  max-width:450px;
  padding:40px 30px;
  border-radius:16px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  border:1px solid var(--border);
  animation: fadeIn 0.6s ease-in-out;
}

.success-circle{
  width:90px;
  height:90px;
  margin:0 auto 20px;
  background:var(--bg);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:48px;
  color:var(--primary-light);
}

h1{
  color:var(--primary);
  margin-bottom:10px;
}

p{
  color:#555;
  font-size:14px;
  margin-bottom:30px;
}

.btn{
  width:100%;
  padding:12px;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
  font-size:14px;
  border:none;
}

.btn-primary{
  background:var(--primary-light);
  color:white;
  margin-bottom:12px;
}

.btn-primary:hover{
  background:var(--primary);
}

.btn-secondary{
  background:white;
  border:1px solid var(--border);
  color:var(--primary);
}

.btn-secondary:hover{
  background:#f1f8e9;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="card">
  
  <div class="success-circle">✓</div>

  <h1>Order Placed Successfully!</h1>
  <p>Thank you for shopping with <b>Sakhi Enterprises</b>.<br>
  Your order has been placed successfully.</p>

  <button class="btn btn-primary" onclick="goToOrders()">
    View My Orders
  </button>

  <button class="btn btn-secondary" onclick="goToProducts()">
    Continue Shopping
  </button>

</div>

<script>
function goToOrders(){
  window.location.href = "myorders.html"; 
  // change path if your orders page path is different
}

function goToProducts(){
  window.location.href = "product.html"; 
  // change path if your product page path is different
}
</script>

</body>
</html>
