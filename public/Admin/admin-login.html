<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin Login - Sakhi Enterprises</title>
  <link rel="stylesheet" href="admin.css">
  <style>body{display:flex;align-items:center;justify-content:center;height:100vh}</style>
</head>
<body>
  <div style="width:360px;background:#fff;padding:24px;border-radius:10px;box-shadow:0 6px 18px rgba(2,6,23,.08)">
    <h2 style="margin:0 0 8px">Admin Sign in</h2>
    <p class="small">Sign in to access the admin panel</p>
    <form id="loginForm" style="margin-top:12px">
      <div style="margin-bottom:8px"><input id="email" placeholder="Email" required style="width:100%"></div>
      <div style="margin-bottom:12px"><input id="password" placeholder="Password" type="password" required style="width:100%"></div>
      <div><button class="btn" type="submit">Sign in</button></div>
    </form>
    <p id="msg" class="small" style="color:red;margin-top:8px"></p>
  </div>
  <script type="module">
    import { loginAdmin } from './admin.js';
    const form = document.getElementById('loginForm');
    form.addEventListener('submit', async (e)=>{
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const r = await loginAdmin(email,password);
      if(r.token){ localStorage.setItem('adminToken', r.token); location.href='admin-dashboard.html'; }
      else document.getElementById('msg').textContent = r.message || 'Login failed';
    });
  </script>
</body>
</html>
